name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth-service
          - services/user-service
          - services/notes-service
          - services/tags-service
          # api-gateway: chưa có test, xem Roadmap trong README
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile
          - name: notes-service
            dockerfile: services/notes-service/Dockerfile
          - name: tags-service
            dockerfile: services/tags-service/Dockerfile
          - name: api-gateway
            dockerfile: api-gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile }} -t noteflow-${{ matrix.name }}-ci .
